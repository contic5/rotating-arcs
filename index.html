<html>
<head>
<title>Rotating Arcs</title>
<link href="/rotating-arcs/style.css" type="text/css" rel="stylesheet">
  <script type="module" crossorigin src="/rotating-arcs/assets/index-yugVhMRH.js"></script>
</head>
<body>
<main>
<h1>Rotating Arcs</h1>
<h2>Settings</h2>
<form>
<table>
<tbody>
<tr>
<td>
<label for="turn_speed">Turn Speed</label>
</td>
<td>
<input id="turn_speed" type="range" min="0" value="50" max="100">
</td>
</tr>
<tr>
<td>
<label for="max_layers">Max Layers</label>
</td>
<td>
<input id="max_layers" type="number" min="1" value="9" max="15">
</td>
</tr>
<tr>
<td>
<label for="layer_size">Layer Size</label>
</td>
<td>
<input id="layer_size" type="range" min="1" value="50" max="80">
</td>
</tr>
<tr>
<td>
<label for="empty_space">Empty Space</label>
</td>
<td>
<input id="empty_space" type="range" min="0" value="30" max="80">
</td>
</tr>
<tr>
<td>
<label for="min_layer_arcs">Minimum Arcs Per Layer</label>
</td>
<td>
<input id="min_layer_arcs" type="number" min="1" max="10" value="4">
</td>
</tr>
<tr>
<td>
<label for="add_arc_for_each_layer">Add Arc for Each Layer</label>
</td>
<td>
<input id="add_arc_for_each_layer" type="checkbox" checked>
</td>
</tr>
<tr>
<td>
<label for="uneven_rotation_speed">Uneven Rotation Speed</label>
</td>
<td>
<input id="uneven_rotation_speed" type="checkbox" checked>
</td>
</tr>
<tr>
<td>
<label for="saturation">Saturation</label>
</td>
<td>
<input id="saturation" type="range" min="0" max="100" value="50">
</td>
</tr>
<tr>
<td>
<label for="lighting">Lighting</label>
</td>
<td>
<input id="lighting" type="range" min="0" max="100" value="70">
</td>
</tr>
<tr>
<td>
<label for="background_color">Background Color</label>
</td>
<td>
<input id="background_color" type="color" value="#000000">
</td>
</tr>
<tr>
<td>
<label for="using_one_color">Using One Color</label>
</td>
<td>
<input id="using_one_color" type="checkbox">
</td>
</tr>
<td>
<label for="drawing_color">Drawing Color</label>
</td>
<td>
<input id="drawing_color" type="color" value="#ffffff">
</td>
</tr>
</tbody>
</table>

</form>
<button id="toggle_pause_button">Pause</button>

<h2>The Drawing</h2>
<canvas id="my_canvas" width="700" height="700"></canvas>
</main>
</body>
</html>
