<html>
<head>
<title>Rotating Arcs</title>
<link href="/style.css" type="text/css" rel="stylesheet">
</head>
<body>
<main>
<h1>Rotating Arcs</h1>
<h2>Settings</h2>
<form>
<div>
<label for="turn_speed">Turn Speed</label>
<input id="turn_speed" type="range" min="0" value="50" max="100">
</div>
<div>
<label for="max_layers">Max Layers</label>
<input id="max_layers" type="number" min="1" value="9" max="15">
</div>
<div>
<label for="layer_size">Layer Size</label>
<input id="layer_size" type="range" min="40" value="50" max="80">
</div>
<div>
<label for="min_layer_arcs">Min Arcs Per Layer</label>
<input id="min_layer_arcs" type="number" min="1" max="10" value="4">
</div>
</form>
<h2>The Drawing</h2>
<canvas id="my_canvas" width="700" height="700"></canvas>
</main>
<script src="src/main.js" type="module"></script>
<script type="module">
import {update_values} from "./src/main.js";

let inputs=document.getElementsByTagName("input");

for(let input of inputs)
{
    input.onchange=update_values;
}
update_values();
</script>
</body>
</html>
